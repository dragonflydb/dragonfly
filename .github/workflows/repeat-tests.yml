name: Repeat Tests

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "The branch on which tests will be repeated"
        type: string
        required: false
      commit:
        description: "A specific commit SHA to test (takes precedence over branch)"
        type: string
        required: false
      count:
        description: "The number of times the tests will be repeated"
        type: number
        required: false
        default: 1
      expression:
        description: "A pytest expression which will filter the tests"
        required: true
        type: string
      second_expression:
        description: "Optional second pytest expression run in a separate pytest process per repeat"
        required: false
        type: string
        default: ""
      second_expression_delay:
        description: "Seconds to sleep between the two split pytest invocations"
        required: false
        type: number
        default: 0
      timeout:
        description: "Overall timeout for all test runs"
        required: false
        type: string
        default: "60m"
      epoll:
        description: "Force epoll mode in test"
        required: false
        type: string
        default: "no"
      use_release:
        description: "Use latest release instead of building dragonfly"
        required: false
        type: string
        default: "no"
      vmodule_expression:
        description: "Emit verbose dragonfly logs for modules, eg x=2,y=3"
        required: false
        type: string
        default: ""
      build_type:
        description: "Build type: Debug or Release"
        required: false
        type: choice
        options:
          - Debug
          - Release
        default: "Debug"
      arch:
        description: "CPU architecture to run on"
        required: false
        type: choice
        options:
          - x86_64
          - arm64
          - both
        default: "x86_64"
      legacy_glog:
        description: "Build with legacy glog (ON) or Abseil logging (OFF)"
        required: false
        type: choice
        options:
          - "OFF"
          - "ON"
        default: "OFF"
      allocation_tracker:
        description: "Enable dragonfly --allocation_tracker, eg 16384:43000 (perturbs RSS; leave empty for clean smaps)"
        required: false
        type: string
        default: ""

jobs:
  build:
    strategy:
      matrix:
        container: ["ubuntu-dev:24"]
        proactor: [Uring]
        build-type: ["${{ inputs.build_type || 'Debug' }}"]
        runner: ${{ fromJSON(inputs.arch == 'arm64' && '[["self-hosted", "linux", "ARM64"]]' || inputs.arch == 'both' && '["ubuntu-latest", ["self-hosted", "linux", "ARM64"]]' || '["ubuntu-latest"]') }}

    runs-on: ${{ matrix.runner }}

    permissions:
      id-token: write
      contents: read

    container:
      image: ghcr.io/romange/${{ matrix.container }}
      options: --security-opt seccomp=unconfined --sysctl "net.ipv6.conf.all.disable_ipv6=0"
      volumes:
        - /var/crash:/var/crash

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.commit || inputs.branch }}

      - name: Print environment info
        run: |
          cat /proc/cpuinfo
          ulimit -a
          env

      - name: Fetch release
        shell: bash
        if: ${{ inputs.use_release == 'yes' }}
        run: |
          mkdir "${GITHUB_WORKSPACE}"/build
          cd "${GITHUB_WORKSPACE}"/build
          arch=$(uname -m)
          tarball="dragonfly-${arch}.tar.gz"
          wget -q "https://github.com/dragonflydb/dragonfly/releases/latest/download/${tarball}"
          tar xf "${tarball}"
          mv "dragonfly-${arch}" dragonfly
          ls -l

      - name: Build Dragonfly
        if: ${{ inputs.use_release != 'yes' }}
        uses: ./.github/actions/builder
        with:
          build-type: ${{matrix.build-type}}
          targets: 'dragonfly'
          legacy-glog: ${{ inputs.legacy_glog }}

      - name: Sync valkey tests
        uses: ./.github/actions/sync-valkey-tests
      - name: Authenticate to AWS
        if: github.repository_owner == 'dragonflydb' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_CI_S3_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run tests on repeat
        shell: bash
        env:
          ALLOCATION_TRACKER: ${{ inputs.allocation_tracker }}
          COUNT: ${{ inputs.count }}
          EPOLL: ${{ inputs.epoll }}
          EXPRESSION: ${{ inputs.expression }}
          SECOND_EXPRESSION: ${{ inputs.second_expression }}
          SECOND_EXPRESSION_DELAY: ${{ inputs.second_expression_delay }}
          TIMEOUT: ${{ inputs.timeout }}
          VMODULE_EXPRESSION: ${{ inputs.vmodule_expression }}
        run: |
          cd "${GITHUB_WORKSPACE}/tests"
          "${GITHUB_WORKSPACE}/.github/scripts/install-pytest-requirements.sh"

          export DRAGONFLY_PATH="${GITHUB_WORKSPACE}/build/dragonfly"
          export UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1

          FORCE_EPOLL=""
          if [[ "${EPOLL}" == "epoll" ]]; then
            FORCE_EPOLL="--df force_epoll=true"
          fi

          VMOD=""
          if [[ -n "${VMODULE_EXPRESSION}" ]]; then
            VMOD="--df vmodule=${VMODULE_EXPRESSION}"
          fi

          ALLOC=""
          if [[ -n "${ALLOCATION_TRACKER}" ]]; then
            ALLOC="--df allocation_tracker=${ALLOCATION_TRACKER}"
          fi
          export FORCE_EPOLL VMOD ALLOC

          run_repeats() {
            read -r -a pytest_args <<< "${EXPRESSION}"
            read -r -a second_pytest_args <<< "${SECOND_EXPRESSION}"
            failures=0
            failed_repeats=()
            for i in $(seq 1 "${COUNT}"); do
              repeat_failed=0

              if [[ -n "${SECOND_EXPRESSION}" ]]; then
                echo "Repeat ${i}/${COUNT} step 1/2: pytest ${EXPRESSION} ${FORCE_EPOLL} ${VMOD}"
                if ! pytest "${pytest_args[@]}" ${FORCE_EPOLL} ${VMOD} ${ALLOC} \
                    --color=yes --json-report --json-report-file="report-${i}-1.json" \
                    --log-cli-level=DEBUG; then
                  repeat_failed=1
                fi

                if [[ "${SECOND_EXPRESSION_DELAY}" -gt 0 ]]; then
                  echo "Repeat ${i}/${COUNT}: sleeping ${SECOND_EXPRESSION_DELAY}s before step 2/2"
                  sleep "${SECOND_EXPRESSION_DELAY}"
                fi

                echo "Repeat ${i}/${COUNT} step 2/2: pytest ${SECOND_EXPRESSION} ${FORCE_EPOLL} ${VMOD}"
                if ! pytest "${second_pytest_args[@]}" ${FORCE_EPOLL} ${VMOD} ${ALLOC} \
                    --color=yes --json-report --json-report-file="report-${i}-2.json" \
                    --log-cli-level=DEBUG; then
                  repeat_failed=1
                fi
              else
                echo "Repeat ${i}/${COUNT}: pytest ${EXPRESSION} ${FORCE_EPOLL} ${VMOD}"
                if ! pytest "${pytest_args[@]}" ${FORCE_EPOLL} ${VMOD} ${ALLOC} \
                    --color=yes --json-report --json-report-file="report-${i}.json" \
                    --log-cli-level=DEBUG; then
                  repeat_failed=1
                fi
              fi

              if [[ "${repeat_failed}" -eq 0 ]]; then
                echo "Repeat ${i}/${COUNT}: passed"
              else
                failures=$((failures + 1))
                failed_repeats+=("${i}")
                echo "Repeat ${i}/${COUNT}: failed"
              fi
            done

            echo "Repeat summary: ${failures}/${COUNT} failed"
            if [[ "${failures}" -ne 0 ]]; then
              mkdir -p /tmp/failed
              printf 'Repeat summary: %s/%s failed\nFailed repeats: %s\n' \
                "${failures}" "${COUNT}" "${failed_repeats[*]}" > /tmp/failed/repeat-summary.txt
              return 1
            fi
            return 0
          }

          timeout "${TIMEOUT}" bash -c "$(declare -f run_repeats); run_repeats" || code=$?
          if [[ "${code:-0}" -eq 124 ]]; then
            echo "Tests timed out"
            cat /tmp/last_test_log_dir.txt | xargs -I {} mv {}/ /tmp/failed/ || true
            exit 1
          fi
          if [[ "${code:-0}" -ne 0 ]]; then
            exit "${code}"
          fi

      - name: Allocation digest
        if: ${{ always() && inputs.allocation_tracker != '' }}
        shell: bash
        run: |
          # Concatenate all logs from the (second) test's dragonfly instance and
          # run the alloc-track parser. Robust to glog/absl log filename differences;
          # non-matching lines are ignored by the parser. Failing repeats are also
          # preserved under /tmp/failed by conftest.
          shopt -s nullglob
          all="/tmp/denyoom_alloc.log"
          : > "${all}"
          cat /tmp/dragonfly_logs/test_denyoom_commands*/* /tmp/failed/test_denyoom_commands*/* >> "${all}" 2>/dev/null || true
          if [[ -s "${all}" ]]; then
            echo "## Allocation digest (test_denyoom_commands)" >> "${GITHUB_STEP_SUMMARY}"
            echo '```' >> "${GITHUB_STEP_SUMMARY}"
            python3 "${GITHUB_WORKSPACE}/tools/analyze_alloc_track.py" "${all}" \
              --json /tmp/failed/alloc-digest.json >> "${GITHUB_STEP_SUMMARY}" 2>&1 \
              || echo "(analyzer failed)" >> "${GITHUB_STEP_SUMMARY}"
            echo '```' >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Allocation digest: no dragonfly logs found" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # Per-backend name so absl and glog dispatches don't collide on download.
          name: logs-${{ inputs.legacy_glog == 'OFF' && 'absl' || 'glog' }}
          path: |
            /tmp/dragonfly_logs
            /tmp/failed
          if-no-files-found: ignore

      - name: Copy binary on a self hosted runner
        if: failure()
        run: |
          # We must use sh syntax.
          if [ "$RUNNER_ENVIRONMENT" = "self-hosted" ]; then
            cd ${GITHUB_WORKSPACE}/build
            timestamp=$(date +%Y-%m-%d_%H:%M:%S)
            mv ./dragonfly /var/crash/dragonfy_${timestamp}
          fi
