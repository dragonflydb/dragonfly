name: Repeat Tests

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "The branch on which tests will be repeated"
        type: string
        required: false
      commit:
        description: "A specific commit SHA to test (takes precedence over branch)"
        type: string
        required: false
      count:
        description: "The number of times the tests will be repeated"
        type: number
        required: false
        default: 1
      expression:
        description: "A pytest expression which will filter the tests"
        required: true
        type: string
      timeout:
        description: "Overall timeout for all test runs"
        required: false
        type: string
        default: "60m"
      epoll:
        description: "Force epoll mode in test"
        required: false
        type: string
        default: "no"
      use_release:
        description: "Use latest release instead of building dragonfly"
        required: false
        type: string
        default: "no"
      vmodule_expression:
        description: "Emit verbose dragonfly logs for modules, eg x=2,y=3"
        required: false
        type: string
        default: ""
      build_type:
        description: "Build type: Debug or Release"
        required: false
        type: choice
        options:
          - Debug
          - Release
        default: "Debug"
      arch:
        description: "CPU architecture to run on"
        required: false
        type: choice
        options:
          - x86_64
          - arm64
          - both
        default: "x86_64"
      legacy_glog:
        description: "Build with legacy glog instead of Abseil logging"
        required: false
        type: choice
        options:
          - "OFF"
          - "ON"
        default: "OFF"

jobs:
  build:
    strategy:
      matrix:
        container: ["ubuntu-dev:24"]
        proactor: [Uring]
        build-type: ["${{ inputs.build_type || 'Debug' }}"]
        runner: ${{ fromJSON(inputs.arch == 'arm64' && '[["self-hosted", "linux", "ARM64"]]' || inputs.arch == 'both' && '["ubuntu-latest", ["self-hosted", "linux", "ARM64"]]' || '["ubuntu-latest"]') }}

    runs-on: ${{ matrix.runner }}

    permissions:
      id-token: write
      contents: read

    container:
      image: ghcr.io/romange/${{ matrix.container }}
      options: --security-opt seccomp=unconfined --sysctl "net.ipv6.conf.all.disable_ipv6=0"
      volumes:
        - /var/crash:/var/crash

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.commit || inputs.branch }}

      - name: Print environment info
        run: |
          cat /proc/cpuinfo
          ulimit -a
          env

      - name: Fetch release
        shell: bash
        if: ${{ inputs.use_release == 'yes' }}
        run: |
          mkdir "${GITHUB_WORKSPACE}"/build
          cd "${GITHUB_WORKSPACE}"/build
          arch=$(uname -m)
          tarball="dragonfly-${arch}.tar.gz"
          wget -q "https://github.com/dragonflydb/dragonfly/releases/latest/download/${tarball}"
          tar xf "${tarball}"
          mv "dragonfly-${arch}" dragonfly
          ls -l

      - name: Build Dragonfly
        if: ${{ inputs.use_release != 'yes' }}
        shell: bash
        run: |
          cmake \
            -S "${GITHUB_WORKSPACE}" \
            -B "${GITHUB_WORKSPACE}/build" \
            -DCMAKE_BUILD_TYPE="${{ matrix.build-type }}" \
            -DCMAKE_CXX_FLAGS=-no-pie \
            -DPRINT_STACKTRACES_ON_SIGNAL=ON \
            -DWITH_AWS=ON \
            -DWITH_GCP=OFF \
            -DWITH_UNWIND=OFF \
            -DWITH_GPERF=OFF \
            -DWITH_ASAN=OFF \
            -DWITH_USAN=OFF \
            -DLEGACY_GLOG="${{ inputs.legacy_glog }}" \
            -GNinja
          ninja -C "${GITHUB_WORKSPACE}/build" dragonfly

      - name: Authenticate to AWS
        if: github.repository_owner == 'dragonflydb' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_CI_S3_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run tests on repeat
        shell: bash
        env:
          AWS_REGION: ${{ env.AWS_REGION || 'us-east-1' }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          COUNT: ${{ inputs.count }}
          DRAGONFLY_S3_BUCKET: ${{ secrets.S3_REGTEST_BUCKET }}
          EPOLL: ${{ inputs.epoll }}
          EXPRESSION: ${{ inputs.expression }}
          TIMEOUT: ${{ inputs.timeout }}
          VMODULE_EXPRESSION: ${{ inputs.vmodule_expression }}
        run: |
          cd "${GITHUB_WORKSPACE}/tests"
          "${GITHUB_WORKSPACE}/.github/scripts/install-pytest-requirements.sh"

          export DRAGONFLY_PATH="${GITHUB_WORKSPACE}/build/dragonfly"
          export UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1

          FORCE_EPOLL=""
          if [[ "${EPOLL}" == "epoll" ]]; then
            FORCE_EPOLL="--df force_epoll=true"
          fi

          VMOD=""
          if [[ -n "${VMODULE_EXPRESSION}" ]]; then
            VMOD="--df vmodule=${VMODULE_EXPRESSION}"
          fi
          export FORCE_EPOLL VMOD

          run_repeats() {
            read -r -a pytest_args <<< "${EXPRESSION}"
            failures=0
            failed_repeats=()
            for i in $(seq 1 "${COUNT}"); do
              echo "Repeat ${i}/${COUNT}: pytest ${EXPRESSION} ${FORCE_EPOLL} ${VMOD}"
              if pytest "${pytest_args[@]}" \
                  ${FORCE_EPOLL} \
                  ${VMOD} \
                  --color=yes \
                  --json-report \
                  --json-report-file="report-${i}.json" \
                  --log-cli-level=DEBUG; then
                echo "Repeat ${i}/${COUNT}: passed"
              else
                failures=$((failures + 1))
                failed_repeats+=("${i}")
                echo "Repeat ${i}/${COUNT}: failed"
              fi
            done

            echo "Repeat summary: ${failures}/${COUNT} failed"
            if [[ "${failures}" -ne 0 ]]; then
              mkdir -p /tmp/failed
              printf 'Repeat summary: %s/%s failed\nFailed repeats: %s\n' \
                "${failures}" "${COUNT}" "${failed_repeats[*]}" > /tmp/failed/repeat-summary.txt
              return 1
            fi
            return 0
          }

          timeout "${TIMEOUT}" bash -c "$(declare -f run_repeats); run_repeats" || code=$?
          if [[ "${code:-0}" -eq 124 ]]; then
            echo "Tests timed out"
            cat /tmp/last_test_log_dir.txt | xargs -I {} mv {}/ /tmp/failed/ || true
            exit 1
          fi
          if [[ "${code:-0}" -ne 0 ]]; then
            exit "${code}"
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs
          path: /tmp/failed/*

      - name: Copy binary on a self hosted runner
        if: failure()
        run: |
          # We must use sh syntax.
          if [ "$RUNNER_ENVIRONMENT" = "self-hosted" ]; then
            cd ${GITHUB_WORKSPACE}/build
            timestamp=$(date +%Y-%m-%d_%H:%M:%S)
            mv ./dragonfly /var/crash/dragonfy_${timestamp}
          fi
