name: AFL++ Long Fuzzing Campaign

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      resp_duration:
        description: 'RESP fuzzing duration in minutes'
        required: false
        default: '60'
        type: string
      memcache_duration:
        description: 'Memcache fuzzing duration in minutes'
        required: false
        default: '30'
        type: string
      tiering_duration:
        description: 'Tiering RESP fuzzing duration in minutes'
        required: false
        default: '60'
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  fuzz-long:
    name: fuzz-long (${{ matrix.target }}${{ matrix.suffix }})
    if: github.repository == 'dragonflydb/dragonfly'
    runs-on: CI-LARGE-86
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: resp
            duration: '60'
            duration_input: resp_duration
          - target: memcache
            duration: '30'
            duration_input: memcache_duration
          - target: resp
            duration: '60'
            duration_input: tiering_duration
            tiering: 'true'
            suffix: '-tiering'

    container:
      image: ghcr.io/romange/ubuntu-dev:24-afl
      options: --security-opt seccomp=unconfined --sysctl "net.ipv6.conf.all.disable_ipv6=0"
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Run AFL++ long fuzzing campaign (${{ matrix.target }}${{ matrix.suffix }})
        uses: ./.github/actions/fuzzing
        with:
          mode: long
          target: ${{ matrix.target }}
          duration-minutes: ${{ github.event.inputs[matrix.duration_input] || matrix.duration }}
          run-number: ${{ github.run_number }}
          tiering: ${{ matrix.tiering || 'false' }}
          artifact-suffix: ${{ matrix.suffix || '' }}

      - name: Send notification on failure
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          job_link="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          message="AFL++ ${{ matrix.target }}${{ matrix.suffix }} fuzzing found crashes.\\n Commit: ${{github.sha}}\\n Job Link: ${job_link}\\n"

          curl -s \
            -X POST \
            -H 'Content-Type: application/json' \
            '${{ secrets.GSPACES_BOT_DF_BUILD }}' \
            -d '{"text": "'"${message}"'"}'
