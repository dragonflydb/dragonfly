name: Build Dragonfly
description: "Build Dragonfly with configurable CMake options"

inputs:
  build-type:
    description: "CMake build type (Debug or Release)"
    required: false
    default: 'Debug'
    type: string
  build-dir:
    description: "Build directory name (relative to workspace root)"
    required: false
    default: 'build'
    type: string
  c-compiler:
    description: "C compiler to use. Leave unset only if the container default is intended"
    required: false
    default: 'unknwn_c_cmpl'
    type: string
  cxx-compiler:
    description: "C++ compiler to use. Leave unset only if the container default is intended"
    required: false
    default: 'unkn_cpp_cmpl'
    type: string
  cxx-flags:
    description: "C++ compiler flags"
    required: false
    default: '-no-pie'
    type: string
  sanitizers:
    description: "Enable sanitizers (NoSanitizers or Sanitizers)"
    required: false
    default: 'NoSanitizers'
    type: string
  with-aws:
    description: "Build with AWS support"
    required: false
    default: 'ON'
    type: string
  targets:
    description: "Build targets to compile"
    required: false
    default: 'src/all'
    type: string
  enable-ccache:
    description: "Use ccache. 'true' restores/saves the cache; 'false' (default) skips it and builds with -DENABLE_CCACHE=OFF"
    required: false
    default: 'false'
    type: string
  ccache-save:
    description: "When ccache is on, set to 'true' to save the updated cache back; 'false' (default) restores read-only"
    required: false
    default: 'false'
    type: string
  ccache-max-size:
    description: "Max ccache size per config (e.g. 1G, 2G, 500M)"
    required: false
    default: '1G'
    type: string
  cache-key-suffix:
    description: "Extra token mixed into the cache key; callers pass the container so glibc/musl caches don't collide"
    required: false
    default: 'default'
    type: string

runs:
  using: "composite"
  steps:
    - name: Check ccache cache-key-suffix
      if: ${{ inputs.enable-ccache == 'true' && inputs.ccache-save == 'true' }}
      shell: bash
      run: |
        # Refuse to write to a shared cache scope: reject an empty/whitespace suffix or the literal "default".
        suffix="${{ inputs.cache-key-suffix }}"
        if [[ -z "${suffix//[[:space:]]/}" || "$suffix" == "default" ]]; then
          echo "::error title=ccache::ccache-save is 'true' but cache-key-suffix is empty or 'default'. Pass a specific cache-key-suffix (e.g. the container image) so writes don't collide across configs."
          exit 1
        fi

    - name: Setup ccache
      if: ${{ inputs.enable-ccache == 'true' }}
      # Persist compiled objects across ephemeral runners so unchanged files aren't recompiled.
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        # ATTENTION: this is the ccache key template. Changing it (or any input that feeds it:
        # cache-key-suffix / build-type / c-compiler / cxx-compiler / sanitizers etc) changes the key
        # for EVERY caller. Keep whatever warms refs/heads/main in sync with this key, or PR
        # builds stop matching the warm cache and go cold.
        key: dfly-ccache-${{ inputs.cache-key-suffix }}-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build-type }}-${{ inputs.c-compiler }}-${{ inputs.cxx-compiler }}-${{ inputs.sanitizers }}
        max-size: ${{ inputs.ccache-max-size }}
        save: ${{ inputs.ccache-save }}
        verbose: 1

    - name: Configure CMake
      shell: bash
      run: |
        # Set sanitizer flags
        ASAN="OFF"
        USAN="OFF"
        if [ '${{ inputs.sanitizers }}' = 'Sanitizers' ]; then
          echo "Enabling ASAN/USAN"
          ASAN="ON"
          USAN="ON"
        fi

        # Build cmake command array
        CMAKE_CMD=(cmake
          -B "${GITHUB_WORKSPACE}/${{ inputs.build-dir }}"
          -DCMAKE_BUILD_TYPE="${{ inputs.build-type }}"
          -GNinja
        )

        # Pass ccache on/off explicitly so the build never depends on the CMake default.
        if [ "${{ inputs.enable-ccache }}" = "true" ]; then
          CMAKE_CMD+=(-DENABLE_CCACHE=ON)
        else
          CMAKE_CMD+=(-DENABLE_CCACHE=OFF)
        fi

        # Add optional compiler overrides. 'unknwn_c_cmpl' / 'unkn_cpp_cmpl' are the key-only sentinel
        # defaults (see the inputs above): treat them like "unset".
        if [ -n "${{ inputs.c-compiler }}" ] && [ "${{ inputs.c-compiler }}" != "unknwn_c_cmpl" ]; then
          CMAKE_CMD+=(-DCMAKE_C_COMPILER="${{ inputs.c-compiler }}")
        fi
        if [ -n "${{ inputs.cxx-compiler }}" ] && [ "${{ inputs.cxx-compiler }}" != "unkn_cpp_cmpl" ]; then
          CMAKE_CMD+=(-DCMAKE_CXX_COMPILER="${{ inputs.cxx-compiler }}")
        fi
        if [ -n "${{ inputs.cxx-flags }}" ]; then
          CMAKE_CMD+=(-DCMAKE_CXX_FLAGS="${{ inputs.cxx-flags }}")
        fi

        # Add fixed options
        CMAKE_CMD+=(
          -DPRINT_STACKTRACES_ON_SIGNAL=ON
          -DWITH_AWS="${{ inputs.with-aws }}"
          -DWITH_GCP=OFF
          -DWITH_UNWIND=OFF
          -DWITH_GPERF=OFF
          -DWITH_ASAN="${ASAN}"
          -DWITH_USAN="${USAN}"
          -DLEGACY_GLOG=OFF
        )

        # Execute CMake
        echo "Running: ${CMAKE_CMD[@]}"
        "${CMAKE_CMD[@]}"

    - name: Build
      shell: bash
      run: |
        cd ${GITHUB_WORKSPACE}/${{ inputs.build-dir }}
        echo "Building target: ${{ inputs.targets }}"
        if [ "${{ inputs.enable-ccache }}" = "true" ]; then
          ccache -z || true   # zero stats so the summary below reflects only this build
        fi
        ninja ${{ inputs.targets }}
        if [ "${{ inputs.enable-ccache }}" = "true" ]; then
          echo "===== ccache stats (this build) ====="
          ccache -s || true
        fi
